# Blueprint de Render: un único servicio con la API y el MCP (D3).
# Los secretos se piden en el dashboard al crear el blueprint (sync: false);
# nunca viven en el repo.
services:
  - type: web
    name: ethos-api
    runtime: python
    plan: free
    rootDir: api
    buildCommand: pip install uv && uv sync --frozen --no-dev
    # --proxy-headers: sin él, la IP del cliente sería la del proxy de Render
    # y el rate limit por IP castigaría a todos por igual.
    startCommand: >-
      uv run uvicorn ethos_api.main:app --host 0.0.0.0 --port $PORT
      --proxy-headers --forwarded-allow-ips '*'
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        value: https://ethos-steel.vercel.app
      - key: ALLOWED_HOSTS
        value: ethos-api-s10w.onrender.com
      - key: PUBLIC_BASE_URL
        value: https://ethos-api-s10w.onrender.com
      - key: WEB_BASE_URL
        value: https://ethos-steel.vercel.app
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: STEAM_API_KEY
        sync: false
      - key: TRAKT_CLIENT_ID
        sync: false
      # Proveedores alternativos por API (D62): Last.fm y MyAnimeList leen
      # datos públicos con la key/client id de la app.
      - key: LASTFM_API_KEY
        sync: false
      - key: MAL_CLIENT_ID
        sync: false
      # Aviso por correo de sugerencias y borrado de cuenta (D52/D53);
      # opcionales: sin ellos se persiste igual, solo no se envía correo.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: FEEDBACK_FROM
        sync: false
      - key: FEEDBACK_TO
        sync: false
