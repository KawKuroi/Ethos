name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**.md"

jobs:
  api:
    name: API (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v7

      - name: Instalar uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "api/uv.lock"

      - name: Sincronizar dependencias
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Tipos (mypy)
        run: uv run mypy

      - name: Tests (pytest + cobertura)
        run: uv run pytest

  web:
    name: Web (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - name: Instalar pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Instalar Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Lint (eslint)
        run: pnpm lint

      - name: Tipos (tsc)
        run: pnpm typecheck

      - name: Tests (vitest)
        run: pnpm test

      - name: Build
        run: pnpm build
