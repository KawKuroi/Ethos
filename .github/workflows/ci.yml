name: CI

on:
  push:
  pull_request:

jobs:
  api:
    name: API (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"

      - name: Sincronizar dependencias
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Tipos (mypy)
        run: uv run mypy

      - name: Tests (pytest)
        run: uv run pytest
