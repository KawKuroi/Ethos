<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Favicon escalable: el logo constelación sin fondo, a sangre y con el
       trazo engrosado (a petición del usuario). El glifo es tinta sobre
       pestaña clara y blanco sobre pestaña oscura; los formatos sin media
       query (favicon.ico, icon.tsx) usan fondo negro con glifo blanco. -->
  <style>
    .fg { fill: #1b1e23; }
    .tr { stroke: #1b1e23; }
    @media (prefers-color-scheme: dark) {
      .fg { fill: #eef0f3; }
      .tr { stroke: #eef0f3; }
    }
  </style>
  <g transform="translate(-6.4 -3.3) scale(2.3)">
    <path
      class="tr"
      d="M8 17 L22 7.5 L26.5 21 L14.5 24.5"
      fill="none"
      stroke-width="2.2"
      stroke-linecap="round"
      stroke-dasharray="0.9 2.6"
      opacity=".95"
    />
    <path class="fg" d="M5 18 C3.5 14 8 12 11 14 C14 16 12 20 8.5 20 C7 20 6 19.5 5 18 Z" />
    <path class="fg" d="M21 7 C20 4 25 3 26 6 C27 9 23 10 22 8.5 C21.5 8 21.2 7.6 21 7 Z" />
    <path class="fg" d="M25 22 C24 19.5 28 18.5 29 21 C29.6 22.6 27 24 25.7 23 C25.3 22.7 25.1 22.4 25 22 Z" />
    <circle class="fg" cx="14" cy="25" r="2" />
  </g>
</svg>
